[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.35"
optimizer = true
optimizer_runs = 200
via_ir = true
extra_output = ["abi", "evm.bytecode"]
fs_permissions = [{ access = "read-write", path = "./deployments.json" }]

[rpc_endpoints]
ritual = "${RPC_URL}"

[etherscan]
ritual = { key = "none", url = "https://explorer.ritualfoundation.org/api" }
